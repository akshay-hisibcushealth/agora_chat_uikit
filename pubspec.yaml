name: agora_chat_uikit
description: "A set of ui components adapted to the chat sdk can quickly build a chat page   and chat through the chat sdk by invoking the ui components."
version: 1.0.0
homepage: https://www.agora.io/
environment:
  sdk: ^3.9.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  plugin_platform_interface: ^2.0.2
  intl: ^0.20.2

  image_picker: ^1.2.0

  file_picker: ^10.3.2

  record: ^6.1.1
  permission_handler: ^12.0.1

  audioplayers: ^6.5.1

  agora_chat_sdk: ^1.3.3
  flutter_svg: ^2.2.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

  plugin:
    platforms:
      android:
        package: com.ease.em_chat_uikit.agora_chat_uikit
        pluginClass: AgoraChatUikitPlugin
      ios:
        pluginClass: AgoraChatUikitPlugin


  assets:
    - images/
flutter_intl:
  enabled: true
